name: CI/CD Pipeline

on:
  push:
  pull_request:

jobs:
  test-and-lint:
    name: Test and Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Create report directories
        run: mkdir -p reports/pytest reports/flake8

      - name: Run Pytest with HTML and JUnit reports
        id: pytest
        shell: bash
        run: |
          set +e
          python -m pytest tests \
            --html=reports/pytest/report.html \
            --self-contained-html \
            --junitxml=reports/pytest/junit.xml
          status=$?
          echo "exit_code=$status" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Run Flake8 with text and HTML reports
        id: flake8
        shell: bash
        run: |
          set +e
          python -m flake8 src tests --config=.flake8 --statistics --tee --output-file=reports/flake8/flake8.txt
          text_status=$?
          python -m flake8 src tests --config=.flake8 --format=html --htmldir=reports/flake8
          html_status=$?
          if [ "$text_status" -ne 0 ] || [ "$html_status" -ne 0 ]; then
            status=1
          else
            status=0
          fi
          echo "exit_code=$status" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Upload Pytest report artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pytest-report
          path: reports/pytest
          if-no-files-found: warn

      - name: Upload Flake8 report artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: flake8-report
          path: reports/flake8
          if-no-files-found: warn

      - name: Publish CI summary
        if: always()
        shell: bash
        run: |
          if [ "${{ steps.pytest.outputs.exit_code }}" = "0" ]; then
            pytest_status="Passed"
          else
            pytest_status="Failed"
          fi
          if [ "${{ steps.flake8.outputs.exit_code }}" = "0" ]; then
            flake8_status="Passed"
          else
            flake8_status="Failed"
          fi
          {
            echo "## CI/CD summary"
            echo ""
            echo "| Stage | Status | Artifact |"
            echo "| --- | --- | --- |"
            echo "| Pytest | $pytest_status | \`pytest-report\` |"
            echo "| Flake8 | $flake8_status | \`flake8-report\` |"
            echo ""
            echo "HTML reports are uploaded as workflow artifacts for this commit."
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Fail workflow when checks fail
        if: always()
        shell: bash
        run: |
          if [ "${{ steps.pytest.outputs.exit_code }}" != "0" ] || [ "${{ steps.flake8.outputs.exit_code }}" != "0" ]; then
            exit 1
          fi
